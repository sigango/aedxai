vlm:
  model_name: "Qwen/Qwen2.5-VL-7B-Instruct"
  model_name_small: "Qwen/Qwen2.5-VL-3B-Instruct"  # For ablation
  quantization: "int4"  # Options: "int4", "int8", "fp16"
  max_new_tokens: 1024
  temperature: 0.0      # Deterministic for evaluation
  top_p: 1.0
  device: "cuda"
  
  # VRAM management
  load_strategy: "sequential"  # Load VLM only when needed, unload detector first
  
  prompt_template: |
    You are an expert object detection evaluator. The image shows numbered 
    bounding boxes drawn over detected objects.
    
    Detection list:
    {detections_json}
    
    For EACH numbered detection, assess these properties:
    1. quality_score (float 0.0-1.0): How well does the bounding box fit the 
       actual object? 1.0 = perfect tight fit, 0.5 = rough fit, 0.0 = no object.
    2. scene_complexity ("low" | "medium" | "high"): 
       "low" = 1-3 well-separated objects, clear background
       "medium" = 4-8 objects or some overlap/occlusion
       "high" = >8 objects, heavy occlusion, cluttered scene
    3. object_relative_size ("small" | "medium" | "large"):
       "small" = object <1% of image area
       "medium" = 1-10% of image area
       "large" = >10% of image area
    4. is_false_positive (boolean): true if no real object exists at the box location
    5. reasoning (string): One sentence explaining your assessment
    
    IMPORTANT: Respond ONLY with valid JSON. No other text.
    Format:
    {"assessments": [{"detection_id": 0, "quality_score": 0.85, "scene_complexity": "medium", "object_relative_size": "large", "is_false_positive": false, "reasoning": "Box tightly fits the person standing in center"}]}
  
  # Retry settings
  max_retries: 3
  retry_prompt_template: |
    Assess detection #{detection_id} only. The box is at coordinates {bbox} 
    with predicted class "{class_name}" (confidence: {confidence:.2f}).
    Respond with JSON: {"quality_score": float, "scene_complexity": str, 
    "object_relative_size": str, "is_false_positive": bool, "reasoning": str}
  
  # Box drawing settings for image annotation
  annotation:
    font_size: 18
    line_width: 3
    colors: ["red", "blue", "green", "orange", "purple", "cyan", "magenta", "yellow"]
    show_confidence: true
    show_class: true

